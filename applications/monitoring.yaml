apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lgtm-monitoring-stack
  namespace: argocd
  annotations:
    # Run after storage (gp3 StorageClass) and karpenter are in place.
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  sources:
    # Source 1: The upstream public Helm chart
    - repoURL: 'https://prometheus-community.github.io/helm-charts'
      targetRevision: 58.2.2
      chart: kube-prometheus-stack
      helm:
        # The $values variable tells ArgoCD to pull this file from Source 2
        valueFiles:
          - $values/lgtm-values.yaml

    # Source 2: this GitHub repository containing the custom config
    - repoURL: 'https://github.com/Walsen/eks-gitops-config.git'
      targetRevision: main
      ref: values

  destination:
    # Deploying to the local EKS cluster
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true      # If we remove code from Git, ArgoCD deletes the resource in AWS
      selfHeal: true   # If someone manually edits the cluster, ArgoCD overwrites it back to Git state
    syncOptions:
      - CreateNamespace=true
      # kube-prometheus-stack's Prometheus/Alertmanager/ThanosRuler CRDs are larger
      # than the 256KB metadata.annotations limit that *client-side* apply imposes
      # (kubectl stores last-applied-configuration there). ArgoCD v2.11.7 did not
      # reliably honor ServerSideApply for these Helm-rendered CRDs, so we use
      # Replace: kubectl replace/create writes no last-applied-configuration
      # annotation and thus has no size limit. Safe here (CRDs/operator come from
      # the same chart; CRs are recreated only on diff).
      - Replace=true
