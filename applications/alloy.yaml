# Grafana Alloy (collector) — runs as a DaemonSet, tails pod logs via the
# Kubernetes API and ships them to Loki's gateway. sync-wave 2: after Loki exists.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: alloy
    targetRevision: 1.10.0
    helm:
      values: |
        # Single Deployment (not DaemonSet): this Alloy collects logs via the
        # Kubernetes API (loki.source.kubernetes), which is cluster-wide. One
        # instance therefore sees every pod's logs. Running it per-node (DaemonSet)
        # would (a) duplicate every log stream and (b) hit the t3.medium ~17-pod
        # density cap (the per-node pod left Pending). For production-scale logging,
        # prefer a DaemonSet that tails node-local files (/var/log/pods) plus VPC CNI
        # prefix delegation for pod density.
        controller:
          type: deployment
          replicas: 1
        alloy:
          configMap:
            content: |-
              logging {
                level  = "info"
                format = "logfmt"
              }

              // Discover all pods in the cluster.
              discovery.kubernetes "pods" {
                role = "pod"
              }

              // Attach useful labels to each log stream.
              discovery.relabel "pod_logs" {
                targets = discovery.kubernetes.pods.targets
                rule {
                  source_labels = ["__meta_kubernetes_namespace"]
                  target_label  = "namespace"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_name"]
                  target_label  = "pod"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_container_name"]
                  target_label  = "container"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_node_name"]
                  target_label  = "node"
                }
              }

              // Read container logs via the Kubernetes API and forward to Loki.
              loki.source.kubernetes "pods" {
                targets    = discovery.relabel.pod_logs.output
                forward_to = [loki.write.default.receiver]
              }

              // Single-tenant Loki (auth_enabled=false): no X-Scope-OrgID needed.
              loki.write "default" {
                endpoint {
                  url = "http://loki-gateway.loki.svc.cluster.local/loki/api/v1/push"
                }
              }
  destination:
    server: https://kubernetes.default.svc
    namespace: alloy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
