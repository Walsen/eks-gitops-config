# Enterprise configurations for kube-prometheus-stack

# The prometheus-operator admission webhook ships as Helm pre/post-install Jobs
# (kube-admission-create/patch). Under ArgoCD with Replace=true these hooks hang
# the sync ("waiting for completion of hook ...kube-admission"). The webhook only
# validates PrometheusRule/etc. CRs; disabling it is a safe simplification for
# this cluster and lets ArgoCD sync cleanly (including the Loki datasource below).
prometheusOperator:
  admissionWebhooks:
    enabled: false

prometheus:
  prometheusSpec:
    # We require persistent storage so metrics survive pod restarts.
    # This will trigger the AWS EBS CSI driver to provision a gp3 volume.
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi # Standard starting size for metrics retention
    
    # Scrape interval tuned for faster scaling response times
    scrapeInterval: "15s"

grafana:
  # Setting a static password for training purposes.
  # In production, this pulls from AWS Secrets Manager, Vault, or OIDC.
  adminPassword: "Kur0EnterprisePassword123!"
  
  persistence:
    enabled: true
    storageClassName: gp3
    accessModes: ["ReadWriteOnce"]
    size: 20Gi

  # We set this to true so Grafana automatically provisions the Prometheus datasource
  sidecar:
    datasources:
      enabled: true
      defaultDatasourceEnabled: true

  # Register Loki (logs) as a datasource so you can query logs in Grafana and
  # correlate them with metrics. Points at Loki's in-cluster gateway.
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki-gateway.loki.svc.cluster.local
      jsonData:
        maxLines: 1000