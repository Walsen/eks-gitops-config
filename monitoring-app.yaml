apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lgtm-monitoring-stack
  namespace: argocd
spec:
  project: default
  sources:
    # Source 1: The upstream public Helm chart
    - repoURL: 'https://prometheus-community.github.io/helm-charts'
      targetRevision: 58.2.2 
      chart: kube-prometheus-stack
      helm:
        # The $values variable tells ArgoCD to pull this file from Source 2
        valueFiles:
          - $values/lgtm-values.yaml
    
    # Source 2: YOUR GitHub repository containing the custom config
    - repoURL: 'https://github.com/Walsen/eks-gitops-config.git' # UPDATE THIS
      targetRevision: main
      ref: values

  destination:
    # Deploying to the local EKS cluster
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true      # If we remove code from Git, ArgoCD deletes the resource in AWS
      selfHeal: true   # If someone manually edits the cluster, ArgoCD overwrites it back to Git state
    syncOptions:
      - CreateNamespace=true