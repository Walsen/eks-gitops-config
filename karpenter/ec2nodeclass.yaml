# EC2NodeClass: the AWS-specific provisioning template Karpenter uses.
# API group karpenter.k8s.aws/v1 matches the Karpenter 1.0.0 chart installed by
# the platform Terraform (eks_blueprints_addons.enable_karpenter).
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  # Amazon Linux 2023, always the latest EKS-optimized AMI for the cluster's
  # Kubernetes version. The alias also implies the AMI family in v1.
  amiSelectorTerms:
    - alias: al2023@latest

  # Must match the deterministic node IAM role created by Terraform
  # (argocd.tf -> karpenter_node.iam_role_name = "karpenter-node-<cluster>").
  # Karpenter manages the instance profile itself from this role in v1.
  role: "karpenter-node-enterprise-eks-cluster"

  # Discover subnets by the tag set on the private subnets (main.tf).
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "enterprise-eks-cluster"

  # Discover the node security group by the tag set via the EKS module's
  # node_security_group_tags (eks.tf). Without that tag this resolves nothing.
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "enterprise-eks-cluster"
