apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: default
spec:
  template:
    spec:
      requirements:
        - key: "karpenter.sh/capacity-type"
          operator: In
          values: ["spot"] # Use Spot instances to save 70-90% cost
      nodeClassRef:
        name: default
  limits:
    cpu: "100" # Max cluster capacity
  disruption:
    consolidationPolicy: WhenUnderutilized
    consolidateAfter: 30s # This is the "Scale to 0" trigger!
